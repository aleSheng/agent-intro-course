<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Head -->
  <rect x="40" y="60" width="176" height="160" rx="36" fill="url(#bg)"/>
  <!-- Antenna base -->
  <rect x="112" y="28" width="32" height="40" rx="8" fill="url(#bg)"/>
  <!-- Antenna tip -->
  <circle cx="128" cy="24" r="14" fill="#06b6d4"/>
  <circle cx="128" cy="24" r="7" fill="#0a0a0b" opacity="0.3"/>
  <!-- Left eye -->
  <rect x="72" y="112" width="40" height="48" rx="12" fill="#0a0a0b" opacity="0.35"/>
  <rect x="76" y="116" width="32" height="40" rx="10" fill="url(#eye)"/>
  <!-- Right eye -->
  <rect x="144" y="112" width="40" height="48" rx="12" fill="#0a0a0b" opacity="0.35"/>
  <rect x="148" y="116" width="32" height="40" rx="10" fill="url(#eye)"/>
  <!-- Mouth / speaker grille -->
  <rect x="92" y="184" width="72" height="8" rx="4" fill="#0a0a0b" opacity="0.3"/>
  <rect x="104" y="198" width="48" height="6" rx="3" fill="#0a0a0b" opacity="0.2"/>
</svg>
